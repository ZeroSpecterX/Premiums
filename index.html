<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="تطبيقات مهكرة, ألعاب مهكرة, Mod APK, Premium, VIP, تحميل مجاني, برامج مدفوعة">
    <meta name="description" content="موقع Premiums يوفر لك أحدث التطبيقات والألعاب المهكرة بمميزات VIP مجاناً لعام 2026.">
    <title>Nexus Core | Premium Software</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>NEXUS CORE</h1>
    <p>Premium Software Distribution</p>
</header>

<div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="ابحث هنا...">
</div>

<div class="container">
    <div class="app-card featured" onclick="openModal('Instagram Pro', 'مميزات النخبة كاملة')">
        <img src="https://traidmode.com/wp-content/uploads/2025/10/v-1-32-180x180.webp" class="app-icon">
        <div class="app-title">انستقرام برو 2026</div>
        <span class="app-version">V14.25 [VIP]</span>
        <a href="#" class="download-btn">تحميل VIP</a>
    </div>

    <div class="app-card" onclick="openModal('Free Fire Mod', 'قائمة مود كاملة')">
        <img src="https://traidmod.com/wp-content/uploads/2024/05/Free-Fire-Logo-240x240.webp" class="app-icon">
        <div class="app-title">مود فري فاير</div>
        <span class="app-version">V1.120.1</span>
        <a href="#" class="download-btn">تحميل الآن</a>
    </div>

    <div class="app-card" onclick="openModal('Minecraft PE', 'سكنات مفتوحة')">
        <img src="https://traidmod.com/wp-content/uploads/2024/06/Minecraft-Logo-240x240.webp" class="app-icon">
        <div class="app-title">ماين كرافت PE</div>
        <span class="app-version">v1.26.10</span>
        <a href="#" class="download-btn">تحميل PE</a>
    </div>

    <div class="app-card" onclick="openModal('Car Simulator 2', 'أموال غير محدودة')">
        <img src="https://traidmod.com/wp-content/uploads/2024/01/Car-Simulator-2-Logo.webp" class="app-icon">
        <div class="app-title">محاكي السيارات 2</div>
        <span class="app-version">v1.60.6</span>
        <a href="#" class="download-btn">تحميل الآن</a>
    </div>
</div>

<div id="appModal" class="modal">
    <div class="modal-content">
        <h2 id="mTitle"></h2>
        <p id="mDesc"></p>
        <button onclick="closeModal()" style="width:100%; padding:10px; border-radius:10px; border:none; background:#007aff; color:white;">إغلاق</button>
    </div>
</div>

<script>
    function openModal(t, d) {
        document.getElementById('mTitle').innerText = t;
        document.getElementById('mDesc').innerText = d;
        document.getElementById('appModal').style.display = 'block';
    }
    function closeModal() {
        document.getElementById('appModal').style.display = 'none';
    }
    // كود البحث البسيط
    document.getElementById('searchInput').oninput = function() {
        let val = this.value.toLowerCase();
        document.querySelectorAll('.app-card').forEach(card => {
            let title = card.querySelector('.app-title').innerText.toLowerCase();
            card.style.display = title.includes(val) ? 'flex' : 'none';
        });
    };
</script>

</body>


</html>
